apiVersion: batch/v1
kind: Job
metadata:
  name: trainer
  namespace: colorflow
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: trainer
    spec:
      serviceAccountName: colorflow-runtime
      restartPolicy: Never
      containers:
        - name: trainer
          image: colorflow-trainer
          imagePullPolicy: IfNotPresent
          env:
            - name: COLORFLOW_OUTPUT_DIR
              value: /outputs
            - name: COLORFLOW_CHECKPOINT_DIR
              value: /outputs/checkpoints
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /outputs
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
            limits:
              cpu: 2000m
              memory: 16Gi
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts
