apiVersion: batch/v1
kind: Job
metadata:
  name: trainer
  namespace: colorflow
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: trainer
    spec:
      serviceAccountName: colorflow-runtime
      restartPolicy: Never
      containers:
        - name: trainer
          image: colorflow-trainer
          imagePullPolicy: IfNotPresent
          env:
            - name: COLORFLOW_OUTPUT_DIR
              value: /outputs/checkpoints
            - name: COLORFLOW_CHECKPOINT_DIR
              value: /outputs/checkpoints
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: MLFLOW_EXPERIMENT_NAME
              value: colorflow-gke
          volumeMounts:
            - name: model-checkpoints
              mountPath: /outputs/checkpoints
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
              ephemeral-storage: 10Gi
            limits:
              cpu: 2000m
              memory: 16Gi
              ephemeral-storage: 10Gi
      volumes:
        - name: model-checkpoints
          persistentVolumeClaim:
            claimName: model-checkpoints
