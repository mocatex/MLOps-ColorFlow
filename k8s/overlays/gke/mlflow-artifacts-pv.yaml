apiVersion: v1
kind: PersistentVolume
metadata:
  name: mlflow-artifacts-gcsfuse
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - implicit-dirs
  claimRef:
    namespace: colorflow
    name: mlflow-artifacts
  csi:
    driver: gcsfuse.csi.storage.gke.io
    volumeHandle: mlops-flow
