  - name: colorflow-ui
    newName: europe-west6-docker.pkg.dev/mlops-colorflow/colorflow/colorflow-ui
    newTag: mlserver-oom-fix-20260507
  - name: colorflow-mlserver
    newName: europe-west6-docker.pkg.dev/mlops-colorflow/colorflow/colorflow-mlserver
    newTag: mlserver-oom-fix-20260507
patches:
  - path: namespace-labels-patch.yaml
  - path: ingress-host-patch.yaml
