    newName: europe-west6-docker.pkg.dev/mlops-colorflow/colorflow/colorflow-mlflow
    newTag: mlserver-oom-fix-20260507
  - name: colorflow-registry
    newName: europe-west6-docker.pkg.dev/mlops-colorflow/colorflow/colorflow-registry
    newTag: mlserver-oom-fix-20260507
