apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlserver
  namespace: colorflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlserver
  template:
    metadata:
      labels:
        app: mlserver
    spec:
      containers:
        - name: mlserver
          image: colorflow-mlserver
          imagePullPolicy: IfNotPresent
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: MLFLOW_REGISTERED_MODEL_NAME
              value: colorflow-demo-model
            - name: MLFLOW_REGISTERED_MODEL_ALIAS
              value: champion
            - name: SERVED_MODEL_NAME
              value: linear-regression
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /mlflow/artifacts
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts